name: 批量初始化所有文件Release
on:
  workflow_dispatch:  # 手动触发

jobs:
  init-all-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 为所有文件创建初始Release
        run: |
          type -p gh || (sudo apt update && sudo apt install -y gh)
          
          jq -r 'to_entries[] | "\(.key) \(.value)"' versions.json | while read -r FILE VERSION; do
            TAG_NAME="${FILE//\//-}-v$VERSION"
            RELEASE_NAME="$FILE v$VERSION"
            
            if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              echo "标签 $TAG_NAME 已存在，跳过"
              continue
            fi
            
            echo "创建初始Release: $FILE v$VERSION"
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
            
            gh release create "$TAG_NAME" \
              --title "$RELEASE_NAME" \
              --notes "初始发布: $FILE 版本 $VERSION" \
              "$FILE"
            
            # 避免触发GitHub API速率限制
            sleep 2
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
